<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Sky Force 1946</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hud" aria-live="polite">
      <div class="chip"><span>Score</span><strong id="scoreValue">0</strong></div>
      <div class="chip"><span>Hi-Score</span><strong id="bestValue">0</strong></div>
      <div class="chip"><span>Lives</span><strong id="livesValue">3</strong></div>
      <div class="chip"><span>Bombs</span><strong id="bombsValue">3</strong></div>
      <div class="chip"><span>Plane</span><strong id="planeNameValue">Mustang</strong></div>
      <div class="chip"><span>Power</span><strong id="weaponValue">P1</strong></div>
      <div class="chip"><span>Speed</span><strong id="speedValue">S1</strong></div>
      <div class="chip"><span>Options</span><strong id="optionValue">0</strong></div>
      <div class="chip"><span>Stage</span><strong id="stageValue">1-1</strong></div>
    </section>

    <section class="plane-select" aria-label="Plane selection">
      <button type="button" class="plane-tab active" data-plane="mustang" aria-selected="true">
        <span>Mustang</span><small>Balanced cannon</small>
      </button>
      <button type="button" class="plane-tab" data-plane="lightning" aria-selected="false">
        <span>Lightning</span><small>Twin laser lanes</small>
      </button>
      <button type="button" class="plane-tab" data-plane="corsair" aria-selected="false">
        <span>Corsair</span><small>Wide spread fire</small>
      </button>
      <button type="button" class="plane-tab" data-plane="raiden" aria-selected="false">
        <span>Raiden</span><small>Heavy rockets</small>
      </button>
    </section>

    <section class="stage">
      <canvas id="game" width="900" height="1200" aria-label="Sky Force 1946 game"></canvas>
      <div class="overlay" id="overlay">
        <h1 id="overlayTitle">Sky Force 1946</h1>
        <p id="overlayMessage">Air raid incoming. Dodge, strafe, and blast through enemy squadrons.</p>
        <div class="overlay-actions">
          <button type="button" id="startButton">Launch Mission</button>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="cyclePlaneButton" type="button" class="ghost character-toggle">Change Character: Mustang</button>
      <button id="pauseButton" type="button" class="ghost pause-toggle">Pause / Resume</button>
    </section>
  </main>

  <script src="game.js"></script>
  <script>
    (() => {
      const button = document.getElementById('cyclePlaneButton');
      const tabs = Array.from(document.querySelectorAll('.plane-tab'));
      if (!button || tabs.length === 0) return;
      const label = () => {
        const active = tabs.find(tab => tab.classList.contains('active')) || tabs[0];
        const name = active.querySelector('span')?.textContent?.trim() || 'Character';
        button.textContent = `Change Character: ${name}`;
      };
      button.addEventListener('click', () => {
        const active = tabs.findIndex(tab => tab.classList.contains('active'));
        const next = tabs[(active + 1 + tabs.length) % tabs.length];
        next.click();
        window.setTimeout(label, 25);
      });
      window.setInterval(label, 500);
      label();
    })();
  </script>
</body>
</html>
