<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sky Force 1946</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <section class="hud" aria-live="polite">
      <div class="chip v27-keep"><span>Score</span><strong id="scoreValue">0</strong></div>
      <div class="chip"><span>Hi-Score</span><strong id="bestValue">0</strong></div>
      <div class="chip"><span>Lives</span><strong id="livesValue">3</strong></div>
      <div class="chip"><span>Bombs</span><strong id="bombsValue">3</strong></div>
      <div class="chip"><span>Power</span><strong id="weaponValue">P1</strong></div>
      <div class="chip"><span>Speed</span><strong id="speedValue">S1</strong></div>
      <div class="chip"><span>Options</span><strong id="optionValue">0</strong></div>
      <div class="chip"><span>Stage</span><strong id="stageValue">1-1</strong></div>
    </section>

    <section class="stage">
      <canvas id="game" width="900" height="1200" aria-label="Sky Force 1946 game"></canvas>
      <div class="overlay" id="overlay">
        <h1 id="overlayTitle">Sky Force 1946</h1>
        <p id="overlayMessage">Air raid incoming. Dodge, strafe, and blast through enemy squadrons.</p>
        <div class="overlay-actions">
          <button type="button" id="startButton">Launch Mission</button>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="pauseButton" type="button" class="ghost">Pause / Resume</button>
      <p>Move: <kbd>Arrows</kbd> / <kbd>WASD</kbd> / mouse / touch</p>
      <p>Bomb: <kbd>Space</kbd></p>
      <p>Power-ups: <kbd>P</kbd> power, <kbd>B</kbd> bomb, <kbd>S</kbd> speed, <kbd>O</kbd> option, <kbd>1UP</kbd> life</p>
    </section>
  </main>

  <script src="mobile-single-audio-guard-v21.js"></script>
  <script src="mobile-fullscreen-loader-v10.js"></script>
  <script src="mobile-enemy-fire-balance-v22.js"></script>
  <script src="mobile-gameplay-enhancements-v23.js"></script>
  <script src="mobile-enemy-count-balance-v24.js"></script>
  <script src="mobile-1945-systems-v25.js"></script>
  <script src="mobile-round-end-audio-stop-v26.js"></script>
  <script src="mobile-raster-assets-health-v28-lite.js"></script>
  <script src="mobile-remove-missiles-layout-v29.js"></script>
  <script src="mobile-restore-weapons-v30.js"></script>
  <script src="mobile-hide-canvas-hud-v31.js"></script>
  <script src="mobile-real-plane-assets-v32.js"></script>
  <script src="mobile-plane-orientation-bullets-v33.js"></script>
  <script src="mobile-health-controller-v34.js"></script>
</body>
</html>
